apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: kustomize
  namespace: monitoring
generatorOptions:
  disableNameSuffixHash: true
namespace: monitoring
resources:
  - ./monitoring-namespace.yaml
  - ./elven-otel-collector/collector-rbac.yaml
  - ./elven-otel-collector/collector-deploy.yaml
  - ./elven-otel-collector/collector-service.yaml
  - ./elven-otel-operator/opentelemetry-operator.yaml

secretGenerator:
  - name: secrets-collector-config
    files:
      - ./elven-otel-collector/collector-config.yaml
