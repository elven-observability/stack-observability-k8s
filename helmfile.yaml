repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

  - name: prometheus
    url: https://prometheus-community.github.io/helm-charts

  - name: faro-collector
    url: https://leozw.github.io/faro-collector

  - name: jetstack
    url: https://charts.jetstack.io

helmDefaults:
  wait: true
  waitForJobs: true
  atomic: true
  cleanupOnFail: true
  timeout: 600
  historyMax: 10

hooks:
  - events: ["prepare"]
    showlogs: true
    command: "./helmfile-global-hooks.sh"
    args:
      - "{{ .HelmfileCommand }}"
      - "prepare"
  - events: ["cleanup"]
    showlogs: true
    command: "./helmfile-global-hooks.sh"
    args:
      - "{{ .HelmfileCommand }}"
      - "cleanup"

releases:
  ######## Certificate #########
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: v1.20.2
    values:
      - ./cert-manager/values.yaml
    hooks:
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "wait"
          - "--for=condition=Available"
          - "deployment/cert-manager"
          - "-n"
          - "cert-manager"
          - "--timeout=180s"
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "wait"
          - "--for=condition=Available"
          - "deployment/cert-manager-webhook"
          - "-n"
          - "cert-manager"
          - "--timeout=180s"
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "wait"
          - "--for=condition=Available"
          - "deployment/cert-manager-cainjector"
          - "-n"
          - "cert-manager"
          - "--timeout=180s"

  ######## prometheus #########
  - name: elven
    namespace: monitoring
    createNamespace: true
    chart: prometheus/kube-prometheus-stack
    version: 86.1.0
    values:
      - ./elven-prometheus/values-prometheus.rendered.yaml

  ######## alloy logs #########
  - name: elven-logs-collector
    namespace: monitoring
    createNamespace: true
    chart: grafana/alloy
    version: 1.8.2
    values:
      - ./elven-logs-collector/values-alloy.yaml

  - name: elven-collector-fe
    namespace: monitoring
    createNamespace: true
    chart: faro-collector/faro-collector
    version: 1.1.0
    values:
      - ./elven-collector-fe/values.yaml

