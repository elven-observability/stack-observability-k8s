repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

  - name: prometheus
    url: https://prometheus-community.github.io/helm-charts

  - name: faro-collector
    url: https://leozw.github.io/faro-collector

  - name: jetstack
    url: https://charts.jetstack.io

hooks:
  - events: ["prepare"]
    showlogs: true
    command: "./helmfile-global-hooks.sh"
    args:
      - "{{ .HelmfileCommand }}"
      - "prepare"
  - events: ["cleanup"]
    showlogs: true
    command: "./helmfile-global-hooks.sh"
    args:
      - "{{ .HelmfileCommand }}"
      - "cleanup"

releases:
  ######## Certificate #########
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: v1.18.2
    values:
      - ./cert-manager/values.yaml
    hooks:
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "wait"
          - "--for=condition=Available"
          - "deployment/cert-manager"
          - "-n"
          - "cert-manager"
          - "--timeout=180s"
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "wait"
          - "--for=condition=Available"
          - "deployment/cert-manager-webhook"
          - "-n"
          - "cert-manager"
          - "--timeout=180s"
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "wait"
          - "--for=condition=Available"
          - "deployment/cert-manager-cainjector"
          - "-n"
          - "cert-manager"
          - "--timeout=180s"

  ######## prometheus #########
  - name: prometheus
    namespace: monitoring
    createNamespace: true
    chart: prometheus/kube-prometheus-stack
    version: 82.15.0
    values:
      - ./prometheus/values-prometheus.rendered.yaml

  ######## alloy logs #########
  - name: elven-logs-collector
    namespace: monitoring
    createNamespace: true
    chart: grafana/alloy
    version: 1.6.2
    values:
      - ./alloy/values-alloy.yaml

  - name: elven-collector-fe
    namespace: monitoring
    createNamespace: true
    chart: faro-collector/faro-collector
    version: 1.1.0
    values:
      - ./collector-fe/values.yaml

  - name: beyla
    namespace: monitoring
    createNamespace: true
    installed: false
    chart: grafana/beyla
    version: 1.15.0
    values:
      - ./beyla/values.yaml
