apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetrycollector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetrycollector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetrycollector
    spec:
      serviceAccountName: opentelemetrycollector
      containers:
        - name: otelcol
          args:
            - --config=/conf/collector-config.yaml
            - --feature-gates=processor.tailsamplingprocessor.recordpolicy,+exporter.prometheusremotewritexporter.EnableMultipleWorkers
          image: otel/opentelemetry-collector-contrib:0.150.1
          volumeMounts:
            - mountPath: /conf
              name: collector-config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 16Gi
          env:
            - name: TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: elven-observability-credentials
                  key: tenantId
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: elven-observability-credentials
                  key: apiToken
          envFrom:
            - secretRef:
                name: elven-observability-credentials
      volumes:
        - name: collector-config
          secret:
            secretName: secrets-collector-config
