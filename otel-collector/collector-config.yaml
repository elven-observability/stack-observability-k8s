receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"
  prometheus:
    config:
      scrape_configs:
        - job_name: "kubernetes-pods"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels:
                [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels:
                [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
              action: replace
              target_label: __scheme__
              regex: (https?)
            - source_labels:
                [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels:
                [
                  __address__,
                  __meta_kubernetes_pod_annotation_prometheus_io_port,
                ]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod

exporters:
  otlp_http:
    endpoint: https://tempo.elvenobservability.com/http
    headers:
      X-Scope-OrgID: "${TENANT_ID}"
      Authorization: "Bearer ${API_TOKEN}"
    compression: gzip
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 20
      queue_size: 10000

  prometheusremotewrite:
    endpoint: https://mimir.elvenobservability.com/api/v1/push
    headers:
      X-Scope-OrgID: "${TENANT_ID}"
      Authorization: "Bearer ${API_TOKEN}"
    resource_to_telemetry_conversion:
      enabled: true
    timeout: 120s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 600s
    remote_write_queue:
      enabled: true
      queue_size: 5000
      num_consumers: 4

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 20

  k8sattributes:
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.pod.name
        - k8s.node.name
    passthrough: false
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  batch:
    timeout: 10s
    send_batch_size: 2000
    send_batch_max_size: 2500

  # ── Traces: só latência alta + errors ──
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: 1000
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes:
            - ERROR
      - name: high-latency
        type: latency
        latency:
          threshold_ms: 500
      # - name: small-sample
      #   type: probabilistic
      #   probabilistic:
      #     sampling_percentage: 5

  # ── Métricas scraped pelo collector: só ruído genérico de scrape/app ──
  filter/prometheus:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - "scrape_.*"
          - "promhttp_.*"
          - "target_info"

  # ── Métricas OTLP e scraped: pruning seguro de atributos voláteis ──
  transform/metrics:
    metric_statements:
      - context: datapoint
        statements:
          # ── IDs que mudam a cada restart (cardinality bomb) ──
          - delete_key(attributes, "container_id")
          - delete_key(attributes, "container.id")
          - delete_key(attributes, "pod_uid")
          - delete_key(attributes, "k8s_pod_uid")
          - delete_key(attributes, "k8s.pod.uid")
          - delete_key(attributes, "uid")
          - delete_key(attributes, "k8s_pod_start_time")
          - delete_key(attributes, "k8s.pod.start_time")
          - delete_key(attributes, "service_instance_id")
          - delete_key(attributes, "service.instance.id")

          # ── Image IDs (mudam a cada build) ──
          - delete_key(attributes, "image_id")
          - delete_key(attributes, "container.image.id")
          - delete_key(attributes, "image_size_in_bytes")

service:
  pipelines:
    metrics/otlp:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, transform/metrics, batch]
      exporters: [prometheusremotewrite]

    metrics/prometheus:
      receivers: [prometheus]
      processors:
        [
          memory_limiter,
          k8sattributes,
          filter/prometheus,
          transform/metrics,
          batch,
        ]
      exporters: [prometheusremotewrite]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, tail_sampling, batch]
      exporters: [otlp_http]
